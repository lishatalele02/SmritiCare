<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmritiCare Diagnosis</title>
    <style>
               body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: url('/static/images/UI bg image_SmritiCAre.jpg') no-repeat center center/cover;
            padding: 11px 20px;
            text-align: left;
            position: relative;
            color: #191970;
        }

        .header h1 {
            font-size: 2.5em;
            font-family: Baskerville, serif;
        }

        /* Navigation */
        .nav {
            float: right;
            margin-top: -38px;
        }

        .nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            background-color: #191970;
            text-align: center;
        }

        .nav a.active {
            text-decoration: underline;
            background-color: #191970;
            color: white;
        }

        .nav a:hover {
            background-color: #87CEFA;
            color: white;
        }

        /* Diagnosis Form */
        .diagnosis-form {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 650px;
            margin: 0 auto;
        }

        .diagnosis-form h2 {
            color: #191970;
        }

        .diagnosis-form label {
            font-weight: bold;
            color: #191970;
        }

        .diagnosis-form input[type="text"],
        .diagnosis-form input[type="number"],
        .diagnosis-form input[type="file"] {
            width: 50%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .diagnosis-form button {
            background-color: #191970;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .diagnosis-form button:hover {
            background-color: #45a049;
        }

        /* Report Section */
        .report-section {
            display: none;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 650px;
            margin: 20px auto;
        }

        .report-section h2 {
            color: #191970;
        }

        .footer {
            text-align: center;
            padding: 10px;
            background: #B9D9EB;
            color: black;
            margin-top: 20px;
        }
        body {
            margin: 0;
            padding: 0; 
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>SmritiCare</h1>
        <nav class="nav">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('about') }}">About Us</a>
            <a href="{{ url_for('index') }}">Diagnosis</a>
            <a href="{{ url_for('faq') }}">FAQ</a>
            {% if 'email' in session %}
                <!-- Show Dashboard and Logout if user is logged in -->
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="#" onclick="confirmLogout()">Logout</a>
            {% else %}
                <!-- Show Login and Signup if user is not logged in -->
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('signup') }}">Signup</a>
            {% endif %}
        </nav>
    </header>

    <main class="container">
        <section class="diagnosis-form">
            <h2 align="center">Diagnosis Form</h2>
            <p align="center">Fill the form and upload your MRI scan to get an Alzheimer's stage prediction.</p>
            <form id="uploadForm" method="POST" action="/predict" enctype="multipart/form-data">
                <label for="name">Enter name:</label>
                <input type="text" id="name" name="name" required>
                <br><br>

                <label for="age">Enter age:</label>
                <input type="number" id="age" name="age" min="1" max="100" required>
                <br><br>

                <label>Gender:</label>
                <input type="radio" id="male" name="gender" value="male" required> Male
                <input type="radio" id="female" name="gender" value="female" required> Female
                <br><br>

                <label for="file">Choose MRI Image (PNG/JPG)</label>
                <input type="file" id="file" name="file" accept=".png, .jpg" required>
                <br><br>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2025 SmritiCare. All rights reserved.</p>
    </footer>
</body>
</html>
