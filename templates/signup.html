<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmritiCare</title>
    <style>
        
    body {
    font-family: Arial, sans-serif;
    background-color: #f9f9f9;
    color: #333;
    line-height: 1.6;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

/* Header */
.header {
    background: url('/static/images/UI bg image_SmritiCAre.jpg') no-repeat center center/cover; /* Background image for the header */
    padding: 11px 20px;
    text-align: left; /* Title alignment to the left */
    position: relative;
    color: #191970; /* Title color */
}

.header h1 {
    font-size: 2.5em;
    font-family: Baskerville, serif; /* Title font change */
}

/* Navigation */
.nav {
    float: right; /* Navbar aligned to the right */
    margin-top: -38px; /* Move tabs slightly upwards */
}

.nav a {
    color: white; /* Nav bar link color */
    margin: 0 10px;
    text-decoration: none;
    font-weight: bold;
    display: inline-block; /* Box-like appearance */
    padding: 5px 10px; /* Added padding for box spacing */
    border-radius: 5px; /* Slightly rounded corners */
    background-color: #191970; /* Light blue background for tabs */
    text-align: center; /* Center align the text */
    font-family: sans-serif; /* Font changed to sans-serif */
}

.nav a.active {
    text-decoration: underline;
    background-color: #191970; /* Same background color as other tabs */
    color: white;
}

.nav a:hover {
    background-color: #87CEFA; /* Change background on hover */
    color: white; /* Text color on hover */
}

/* Logo */
.logo-container {
    display: flex;
    align-items: center;
}

.logo {
    height: 60px; /* Adjust the size as needed */
    margin-right: 15px;
}

/* Login Form */
.signup-form {
    background-color: rgba(255, 255, 255, 0.8);
    border-radius: 10px;
    padding: 20px;
    max-width: 450px;
    margin: 50px auto;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.signup-form h2 {
    color: #191970;
    text-align: center;
    margin-bottom: 5px;
    font-family: sans-serif; /* Font changed to sans-serif */
}

.signup-form label {
    color: #191970;
    font-size: 1rem;
    font-family: sans-serif; /* Font changed to sans-serif */
}

.signup-form input {
    width: 93%;
    padding: 10px;
    margin-bottom: 4px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 1rem;
}

.signup-form button {
    background-color: #191970;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    font-size: 1rem;
    width: 100%;
    cursor: pointer;
}

.signup-form button:hover {
    background-color: #45a049;
}

/* Footer */
.footer {
    text-align: center;
    padding: 10px;
    background: #B9D9EB; /* Light blue footer background */
    color: black;
    margin-top: 20px;
}
body {
        margin: 0;
        padding: 0; 
        }

        .alert {
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    text-align: center;
}

.alert-info {
    background-color: #d9edf7;
    color: #31708f;
}

.alert-success {
    background-color: #dff0d8;
    color: #3c763d;
}

.alert-warning {
    background-color: #fcf8e3;
    color: #8a6d3b;
}

    </style>
<!-- Flash messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
    <script src="scripts.js"></script>
    <script>
    function confirmLogout() {
        if (confirm("Are you sure you want to log out from My App?")) {
            window.location.href = "{{ url_for('logout') }}";
        }
    }
</script>
</body>
</html>
